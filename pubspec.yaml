name: swipe_eat
description: A Forui-first mobile starter for Swipe Eat with Laravel-ready auth screens.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  forui: ^0.22.3
  go_router: ^17.3.0
  geolocator: ^14.0.2
  webview_flutter: ^4.13.0
  webview_flutter_wkwebview: ^3.26.0

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
